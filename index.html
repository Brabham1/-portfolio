<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abdullahi Mahamud — Study Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      color: #c9ffdb;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Matrix canvas background ── */
    #matrix-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.18;
      pointer-events: none;
    }

    /* ── Scanlines overlay ── */
    #portfolio-content::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    #portfolio-content {
      display: none;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      padding: 60px 20px 40px;
      text-align: center;
      border-bottom: 1px solid rgba(0,255,65,0.2);
      position: relative;
    }

    header::before {
      content: '// SYSTEM ACCESS GRANTED';
      display: block;
      font-size: 0.75rem;
      color: #00ff41;
      opacity: 0.6;
      margin-bottom: 16px;
      letter-spacing: 3px;
    }

    header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 2.8rem;
      font-weight: 700;
      color: #00ff41;
      text-shadow: 0 0 20px rgba(0,255,65,0.8), 0 0 40px rgba(0,255,65,0.4);
      letter-spacing: 3px;
    }

    header p {
      font-size: 0.95rem;
      margin-top: 10px;
      color: #00d4ff;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0,212,255,0.6);
    }

    /* ── Main ── */
    main {
      max-width: 1100px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      margin-bottom: 30px;
      color: #00ff41;
      text-shadow: 0 0 10px rgba(0,255,65,0.5);
      border-bottom: 1px solid rgba(0,255,65,0.3);
      padding-bottom: 10px;
      letter-spacing: 2px;
    }

    .section-title::before { content: '> '; opacity: 0.6; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 40px 20px;
      margin-top: 60px;
      color: rgba(0,255,65,0.3);
      font-size: 0.8rem;
      border-top: 1px solid rgba(0,255,65,0.1);
      letter-spacing: 2px;
    }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
    }

    #video-bg { position: absolute; inset: 0; width: 100%; height: 100%; border: none; pointer-events: none; }

    #bg-video {
      position: absolute;
      top: 50%; left: 50%;
      width: 177.78vh; height: 100vh;
      min-width: 100%; min-height: 56.25vw;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    #overlay-dim { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }

    #login-box {
      position: relative; z-index: 2;
      background: rgba(0,10,0,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid #00ff41;
      border-radius: 4px;
      padding: 48px 40px;
      box-shadow: 0 0 40px rgba(0,255,65,0.3), inset 0 0 40px rgba(0,255,65,0.03);
      text-align: center;
      width: 100%; max-width: 380px;
    }

    #login-box h2 {
      font-family: 'Orbitron', monospace;
      color: #00ff41;
      font-size: 1.4rem;
      margin-bottom: 6px;
      text-shadow: 0 0 15px rgba(0,255,65,0.8);
      letter-spacing: 3px;
    }

    #login-box p {
      color: rgba(0,255,65,0.5);
      font-size: 0.82rem;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    #login-box input {
      width: 100%; padding: 12px 16px;
      border: 1px solid rgba(0,255,65,0.4);
      border-radius: 4px; font-size: 0.95rem;
      font-family: 'Share Tech Mono', monospace;
      outline: none;
      background: rgba(0,255,65,0.05);
      color: #00ff41;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 2px;
    }
    #login-box input::placeholder { color: rgba(0,255,65,0.3); }
    #login-box input:focus {
      border-color: #00ff41;
      box-shadow: 0 0 10px rgba(0,255,65,0.3);
    }

    #login-box button {
      margin-top: 14px; width: 100%; padding: 12px;
      background: rgba(0,255,65,0.1);
      color: #00ff41;
      border: 1px solid #00ff41;
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #login-box button:hover {
      background: rgba(0,255,65,0.2);
      box-shadow: 0 0 15px rgba(0,255,65,0.4);
    }

    #login-error {
      color: #ff0040;
      font-size: 0.82rem;
      margin-top: 12px;
      display: none;
      text-shadow: 0 0 8px rgba(255,0,64,0.6);
    }

    #unmute-btn {
      position: absolute; bottom: 20px; right: 20px; z-index: 3;
      background: rgba(0,0,0,0.6); color: rgba(0,255,65,0.7);
      border: 1px solid rgba(0,255,65,0.3);
      border-radius: 4px; padding: 8px 14px;
      cursor: pointer; font-size: 0.8rem;
      font-family: 'Share Tech Mono', monospace;
    }
    #unmute-btn:hover { color: #00ff41; border-color: #00ff41; }

    /* ── Tracker ── */
    .tr-wrap {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    .tr-cal-panel {
      flex: 1;
      background: #0d1117;
      border: 1px solid rgba(0,255,65,0.25);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .tr-cal-panel h3 {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 400;
      margin-bottom: 1rem;
      color: #00d4ff;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(0,212,255,0.4);
    }

    .tr-day-headers, .tr-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .tr-day-headers { margin-bottom: 3px; }

    .tr-day-header {
      text-align: center;
      font-size: 0.65rem;
      color: rgba(0,255,65,0.4);
      padding: 2px 0 6px;
      letter-spacing: 1px;
    }

    .tr-day-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.12s;
      position: relative;
      min-width: 0;
      padding: 2px;
      background: rgba(0,255,65,0.03);
    }

    .tr-day-cell:hover { background: rgba(0,255,65,0.1); border-color: rgba(0,255,65,0.3); }
    .tr-day-cell.tr-empty    { cursor: default; pointer-events: none; background: transparent; }
    .tr-day-cell.tr-today    { border-color: #00ff41; box-shadow: 0 0 6px rgba(0,255,65,0.4); }
    .tr-day-cell.tr-selected { background: #00ff41 !important; color: #000 !important; border-color: #00ff41; }
    .tr-day-cell.tr-selected .tr-day-month { color: rgba(0,0,0,0.7) !important; }
    .tr-day-cell.tr-selected .tr-day-number { color: #000 !important; }
    .tr-day-cell.tr-full    { background: rgba(0,255,65,0.12); }
    .tr-day-cell.tr-partial { background: rgba(255,200,0,0.1); }
    .tr-day-cell.tr-exam-day { border-color: #ff0040 !important; box-shadow: 0 0 6px rgba(255,0,64,0.4); }
    .tr-day-cell.tr-exam-day .tr-day-month { color: #ff0040 !important; }
    .tr-day-cell.tr-selected.tr-exam-day .tr-day-month { color: rgba(0,0,0,0.7) !important; }
    .tr-day-cell.tr-mappe-day { border-color: #ff9900 !important; box-shadow: 0 0 6px rgba(255,153,0,0.4); }
    .tr-day-cell.tr-mappe-day .tr-day-month { color: #ff9900 !important; }
    .tr-day-cell.tr-selected.tr-mappe-day .tr-day-month { color: rgba(0,0,0,0.7) !important; }
    .tr-day-cell.tr-hjemme-day { border-color: #aa00ff !important; box-shadow: 0 0 6px rgba(170,0,255,0.4); }
    .tr-day-cell.tr-hjemme-day .tr-day-month { color: #aa00ff !important; }
    .tr-day-cell.tr-selected.tr-hjemme-day .tr-day-month { color: rgba(0,0,0,0.7) !important; }

    .tr-day-number { font-size: 0.85rem; font-weight: 600; line-height: 1; color: #c9ffdb; }
    .tr-day-month  { font-size: 0.55rem; color: rgba(0,255,65,0.5); margin-top: 2px; }

    .tr-status-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; }

    .tr-exam-badge {
      font-size: 0.45rem; font-weight: 700;
      color: #ff0040; letter-spacing: 0.05em;
      margin-top: 1px; line-height: 1;
      text-shadow: 0 0 4px rgba(255,0,64,0.6);
    }
    .tr-day-cell.tr-selected .tr-exam-badge { color: rgba(0,0,0,0.8); text-shadow: none; }

    .tr-tasks-panel {
      width: 280px;
      flex-shrink: 0;
      background: #0d1117;
      border: 1px solid rgba(0,255,65,0.25);
      border-radius: 8px;
      padding: 1.5rem;
      position: sticky;
      top: 1.5rem;
    }

    .tr-tasks-panel h3 {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: #00d4ff;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(0,212,255,0.4);
    }

    .tr-date-label {
      font-size: 0.78rem;
      color: #00ff41;
      margin-bottom: 1rem;
      text-shadow: 0 0 6px rgba(0,255,65,0.4);
      letter-spacing: 1px;
    }

    .tr-exam-banner {
      background: rgba(255,0,64,0.1);
      border: 1px solid rgba(255,0,64,0.4);
      border-radius: 4px;
      padding: 0.6rem 0.85rem;
      margin-bottom: 0.75rem;
      font-size: 0.78rem;
      color: #ff0040;
      text-shadow: 0 0 6px rgba(255,0,64,0.5);
    }

    .tr-task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(0,255,65,0.08);
    }
    .tr-task-item:last-child { border-bottom: none; }

    .tr-task-item input[type="checkbox"] {
      width: 15px; height: 15px;
      flex-shrink: 0; margin-top: 2px;
      accent-color: #00ff41; cursor: pointer;
    }

    .tr-task-text {
      font-size: 0.8rem;
      line-height: 1.5;
      cursor: pointer;
      user-select: none;
      color: #8b9467;
      letter-spacing: 0.5px;
    }
    .tr-task-item.tr-done .tr-task-text { text-decoration: line-through; color: rgba(0,255,65,0.25); }

    .tr-progress-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(0,255,65,0.1);
    }
    .tr-progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: rgba(0,255,65,0.5);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .tr-progress-track { height: 4px; background: rgba(0,255,65,0.1); border-radius: 2px; overflow: hidden; }
    .tr-progress-fill  {
      height: 100%; background: #00ff41;
      border-radius: 2px; transition: width 0.3s;
      box-shadow: 0 0 8px rgba(0,255,65,0.6);
    }

    .tr-streak-box {
      margin-top: 1rem;
      background: rgba(0,255,65,0.05);
      border: 1px solid rgba(0,255,65,0.15);
      border-radius: 4px;
      padding: 0.7rem 1rem;
      text-align: center;
      font-size: 0.76rem;
      color: rgba(0,255,65,0.5);
      letter-spacing: 1px;
    }
    .tr-streak-box strong { color: #00ff41; font-size: 1rem; text-shadow: 0 0 8px rgba(0,255,65,0.6); }

    .tr-legend {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      font-size: 0.65rem;
      color: rgba(0,255,65,0.4);
      flex-wrap: wrap;
      letter-spacing: 0.5px;
    }
    .tr-legend-item { display: flex; align-items: center; gap: 5px; }
    .tr-legend-dot  { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    @media (max-width: 700px) {
      .tr-wrap { flex-direction: column; }
      .tr-tasks-panel { width: 100%; position: static; }
      header h1 { font-size: 1.8rem; }
    }

  </style>
</head>
<body>

  <!-- Matrix rain canvas (shown after login) -->
  <canvas id="matrix-canvas"></canvas>

  <!-- Login Overlay -->
  <div id="login-overlay">
    <div id="video-bg">
      <video id="bg-video" autoplay muted playsinline>
        <source src="senna.mp4" type="video/mp4" />
      </video>
    </div>

    <div id="login-box">
      <h2>ACCESS</h2>
      <p>// ENTER AUTHORIZATION CODE</p>

  <div id="portfolio-content">

    <header>
      <h1>STUDY TRACKER</h1>
      <p>// ABDULLAHI MAHAMUD — MAR 15 → JUN 5, 2026</p>
    </header>

    <main>

      <h2 class="section-title">STUDY TRACKER</h2>

      <div class="tr-wrap">

        <div class="tr-cal-panel">
          <h3>MAR 15 → JUN 5, 2026</h3>
          <div class="tr-day-headers">
            <div class="tr-day-header">MON</div>
            <div class="tr-day-header">TUE</div>
            <div class="tr-day-header">WED</div>

      </div>

    </main>

    <footer>&copy; 2026 ABDULLAHI MAHAMUD // ALL RIGHTS RESERVED</footer>

  </div>

  <script>
    /* ── Matrix Rain ── */
    (function () {
      var canvas  = document.getElementById('matrix-canvas');
      var ctx     = canvas.getContext('2d');
      var chars   = 'アカサタナハマヤラワガザダバパ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ<>{}[]|/\\';
      var fontSize = 13;
      var drops   = [];

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
      }

      window.addEventListener('resize', resize);
      resize();

      function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff41';
        ctx.font = fontSize + 'px monospace';
        for (var i = 0; i < drops.length; i++) {
          ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }

      setInterval(draw, 40);
    })();

    /* ── Portfolio JS ── */
    var muted    = true;
    var VID_START = 0;
    var VID_END   = 200;

    window.addEventListener('load', function () {
      var video = document.getElementById('bg-video');
      video.currentTime = VID_START;
      video.play();
      video.addEventListener('timeupdate', function () {
        if (video.currentTime >= VID_END) video.currentTime = VID_START;
      });
    });

    function toggleMute() {
      var video = document.getElementById('bg-video');
      var btn   = document.getElementById('unmute-btn');
      if (muted) { video.muted = false; video.volume = 1; btn.textContent = '[ MUTE ]'; muted = false; }
      else        { video.muted = true;                    btn.textContent = '[ UNMUTE ]'; muted = true; }
    }

    function checkPassword() {
      var input = document.getElementById('password-input').value;
      if (input === 'Brabham123') {
        document.getElementById('bg-video').pause();
        document.getElementById('login-overlay').style.display       = 'none';
        document.getElementById('portfolio-content').style.display   = 'block';
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('password-input').value = '';
        document.getElementById('password-input').focus();
      }
    }

    /* ── Tracker JS ── */
    (function () {
      var TR_START      = new Date(2026, 2, 15);
      var TR_TOTAL_DAYS = 83;
      var TR_STORE      = 'study_tracker_v1';

      var TR_DAILY = [
        { id: 'matte2',   label: 'Matte 2 — 2-3 hours' },
        { id: 'training', label: 'Training / walking — 1 hour' },
      ];
      var TR_EXFIL = { id: 'exfil', label: 'Exfil — 1 hour' };

      var TR_FOCUS = [
        { id: 'mek',   label: 'Mekatronikk med ROS2' },
        { id: 'dyn',   label: 'Dynamisk systemer 2' },
        { id: 'ind',   label: 'Industriell styresystemer' },
        { id: 'intel', label: 'Intelligente systemer' },
      ];

      var TR_EXAMS = [
        { date: '2026-04-17', subject: 'Exfil', type: 'hjemme' },
        { date: '2026-04-18', subject: 'Exfil', type: 'hjemme' },
        { date: '2026-04-19', subject: 'Exfil', type: 'hjemme' },
        { date: '2026-05-05', subject: 'Intelligente systemer',     type: 'exam' },
        { date: '2026-05-06', subject: 'Exfil',                     type: 'exam' },
        { date: '2026-05-07', subject: 'Matte 2',                   type: 'exam' },
        { date: '2026-05-19', subject: 'Mekatronikk med ROS2',      type: 'mappe' },
        { date: '2026-05-22', subject: 'Dynamisk systemer 2',       type: 'mappe' },
        { date: '2026-06-04', subject: 'Industriell styresystemer', type: 'mappe' },
      ];

      var EXAM_MAP = {};
      TR_EXAMS.forEach(function (e) { EXAM_MAP[e.date] = e; });

      var MS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var ML   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

      function key(d)    { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
      function shift(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
      function fromKey(k){ var p=k.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
      function label(d)  { return DAYS[d.getDay()].slice(0,3)+', '+ML[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear(); }
      function load()    { try{ return JSON.parse(localStorage.getItem(TR_STORE))||{}; } catch(e){ return {}; } }
      function save(d)   { localStorage.setItem(TR_STORE, JSON.stringify(d)); }

      function tasksFor(k) {
        if (EXAM_MAP[k] && EXAM_MAP[k].type === 'exam')   return [{ id: 'exam_'+k,   label: EXAM_MAP[k].subject + ' — EKSAMEN' }];
        if (EXAM_MAP[k] && EXAM_MAP[k].type === 'mappe')  return [{ id: 'mappe_'+k,  label: EXAM_MAP[k].subject + ' — MAPPE INNLEVERING' }];
        if (EXAM_MAP[k] && EXAM_MAP[k].type === 'hjemme') return [{ id: 'hjemme_'+k, label: EXAM_MAP[k].subject + ' — HJEMMEEKSAMEN' }];
        var dow = fromKey(k).getDay();
        var base = TR_DAILY.slice();
        if (dow === 0 || dow === 3 || dow === 5) base = base.concat([TR_EXFIL]);
        if (dow === 2 || dow === 3) return base.concat([TR_FOCUS.find(function(t){ return t.id==='ind'; })]);
        if (dow === 1 || dow === 4) return base.concat([TR_FOCUS.find(function(t){ return t.id==='dyn'; })]);
        var rot = TR_FOCUS.filter(function(t){ return t.id!=='ind' && t.id!=='dyn'; });
        var idx = Math.round((fromKey(k)-TR_START)/86400000);
        return base.concat([rot[Math.floor(idx/7)%rot.length]]);
      }

      function status(k, data) {
        var day=data[k]; if(!day) return 'none';
        var tasks=tasksFor(k);
        var n=tasks.filter(function(t){ return day[t.id]; }).length;
        if(n===0) return 'none'; if(n===tasks.length) return 'full'; return 'partial';
      }

      function streak(data) {
        var s=0, d=new Date(TR_START), lim=key(new Date());
        while(key(d)<=lim){ if(status(key(d),data)==='full') s++; else s=0; d=shift(d,1); }
        return s;
      }

      var TODAY = key(new Date());
      var TR_END = key(shift(TR_START, TR_TOTAL_DAYS-1));
      var sel    = (TODAY>=key(TR_START)&&TODAY<=TR_END) ? TODAY : key(TR_START);
      var data   = load();

      function renderCal() {
        var grid = document.getElementById('tr-calendar');
        grid.innerHTML = '';
        var off = (TR_START.getDay()+6)%7;
        for(var i=0;i<off;i++){ var b=document.createElement('div'); b.className='tr-day-cell tr-empty'; grid.appendChild(b); }
        for(var j=0;j<TR_TOTAL_DAYS;j++){
          (function(idx){
            var d=shift(TR_START,idx), k=key(d), st=status(k,data), ex=EXAM_MAP[k];
            var cell=document.createElement('div');
            var cls=['tr-day-cell'];
            if(k===TODAY) cls.push('tr-today');
            if(ex) cls.push('tr-exam-day', ex.type==='mappe' ? 'tr-mappe-day' : ex.type==='hjemme' ? 'tr-hjemme-day' : '');
            if(k===sel) cls.push('tr-selected');
            else if(st==='full') cls.push('tr-full');
            else if(st==='partial') cls.push('tr-partial');
            cell.className=cls.join(' ');
            var dot='';
            if(st!=='none'&&k!==sel){ var c=st==='full'?'#00ff41':'#ffb300'; dot='<span class="tr-status-dot" style="background:'+c+'"></span>'; }
            var badge=ex?'<span class="tr-exam-badge">EXAM</span>':'';
            cell.innerHTML='<span class="tr-day-number">'+d.getDate()+'</span><span class="tr-day-month">'+MS[d.getMonth()]+'</span>'+(badge||dot);
            cell.addEventListener('click',function(){ sel=k; render(); });
            grid.appendChild(cell);
          })(j);
        }
      }

      function renderTasks() {
        document.getElementById('tr-date-label').textContent = '// '+label(fromKey(sel));
        var list=document.getElementById('tr-task-list');
        var dd=data[sel]||{}, tasks=tasksFor(sel);
        list.innerHTML='';
        if(EXAM_MAP[sel]){ var ban=document.createElement('div'); ban.className='tr-exam-banner'; var entry=EXAM_MAP[sel]; var lbl=entry.type==='mappe'?'[ MAPPE INNLEVERING ]':entry.type==='hjemme'?'[ HJEMMEEKSAMEN ]':'[ EKSAMEN ]'; ban.innerHTML=lbl+' '+entry.subject; list.appendChild(ban); }
        tasks.forEach(function(task){
          var chk=!!dd[task.id];
          var item=document.createElement('div'); item.className='tr-task-item'+(chk?' tr-done':'');
          var cb=document.createElement('input'); cb.type='checkbox'; cb.checked=chk; cb.id='tr_cb_'+task.id;
          var lbl=document.createElement('label'); lbl.className='tr-task-text'; lbl.htmlFor='tr_cb_'+task.id; lbl.textContent='> '+task.label;
          cb.addEventListener('change',function(){
            if(!data[sel]) data[sel]={};
            data[sel][task.id]=cb.checked;
            save(data);
            if(cb.checked){
              var ac=new (window.AudioContext||window.webkitAudioContext)();
              [[0,1500,0.12],[0.04,2000,0.10],[0.09,2500,0.08],[0.15,3000,0.06]].forEach(function(n){
                var o=ac.createOscillator(); var g=ac.createGain();
                o.connect(g); g.connect(ac.destination);
                o.type='triangle';
                o.frequency.setValueAtTime(n[1],ac.currentTime+n[0]);
                o.frequency.exponentialRampToValueAtTime(n[1]*1.04,ac.currentTime+n[0]+0.03);
                g.gain.setValueAtTime(n[2],ac.currentTime+n[0]);
                g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+n[0]+0.18);
                o.start(ac.currentTime+n[0]); o.stop(ac.currentTime+n[0]+0.18);
              });
            }
            render();
          });
          item.appendChild(cb); item.appendChild(lbl); list.appendChild(item);
        });
        var done=tasks.filter(function(t){ return !!(data[sel]||{})[t.id]; }).length;
        var pct=Math.round((done/tasks.length)*100);
        document.getElementById('tr-prog-text').textContent=done+' / '+tasks.length+' completed';
        document.getElementById('tr-prog-pct').textContent=pct+'%';
        document.getElementById('tr-prog-fill').style.width=pct+'%';
        var s=streak(data), box=document.getElementById('tr-streak-box');
        box.innerHTML=s>0?'STREAK: <strong>'+s+'</strong> DAY'+(s!==1?'S':'')+'  🔥':'// COMPLETE ALL TASKS TO START STREAK';
      }

      function render() { renderCal(); renderTasks(); }
      render();
    })();

  </script>
